name: Keep Render Alive
on:
  schedule:
    - cron: '*/7 * * * *'
    - cron: '*/13 * * * *'
    - cron: '5 3 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: |
          STATUS=$(curl -s --max-time 180 -o /dev/null -w "%{http_code}" https://vocabmasterpro.onrender.com/health)
          echo "Status: $STATUS"

      - name: Checkout repo (daily run only)
        if: github.event.schedule == '5 3 * * *'
        uses: actions/checkout@v4

      - name: Update keepalive file
        if: github.event.schedule == '5 3 * * *'
        run: |
          date > .github/keepalive.txt

      - name: Commit keepalive update
        if: github.event.schedule == '5 3 * * *'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .github/keepalive.txt
          git commit -m "Daily keepalive update" || echo "No changes"
          git push
